version: "3.9"

# ---------------------------------------------------------------------------
# Root compose file — core sandbox + optional module sidecars
#
# Usage:
#   docker compose up                         # core only
#   docker compose -f docker-compose.yml \
#     -f docker-compose.android.yml up        # core + android
# ---------------------------------------------------------------------------

services:
  sandbox:
    build:
      context: ./core
      dockerfile: Dockerfile
    image: agent-sandbox-core:latest
    container_name: agent-sandbox
    ports:
      - "${NGINX_PORT:-8080}:8080"   # nginx dashboard
      - "${VNC_PORT:-5900}:5900"     # VNC direct
      - "${NOVNC_PORT:-6080}:6080"   # noVNC WebSocket
      - "${MCP_PORT:-8079}:8079"     # MCP server
      - "${API_PORT:-8091}:8091"     # REST API v1
      - "${CDP_PORT:-9222}:9222"     # Chromium CDP (for Playwright connect_over_cdp)
    environment:
      - VNC_PASSWORD=${VNC_PASSWORD:-sandbox}
      - DISPLAY=:1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      # Mount modules read-only so entrypoint can copy enabled confs
      - ./modules:/sandbox/modules:ro
      # Persist home directory across restarts
      - sandbox-home:/root
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  sandbox-home:
    name: agent-sandbox-home

networks:
  default:
    name: agent-sandbox-net
