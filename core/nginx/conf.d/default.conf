server {
    listen 8080 default_server;
    server_name _;

    # -------------------------------------------------------------------------
    # Dashboard — index page listing all available services
    # -------------------------------------------------------------------------
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Sandbox</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0f1117; color: #e2e8f0; min-height: 100vh;
         display: flex; flex-direction: column; align-items: center;
         padding: 40px 20px; }
  h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: #fff; }
  p.sub { color: #94a3b8; margin-bottom: 40px; font-size: 0.95rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
          gap: 20px; width: 100%; max-width: 900px; }
  .card { background: #1e2130; border: 1px solid #2d3348; border-radius: 12px;
          padding: 24px; text-decoration: none; color: inherit;
          transition: border-color 0.2s, transform 0.2s; }
  .card:hover { border-color: #6366f1; transform: translateY(-2px); }
  .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; color: #a5b4fc; }
  .card p { font-size: 0.85rem; color: #94a3b8; margin-bottom: 12px; }
  .badge { display: inline-block; font-size: 0.75rem; padding: 2px 8px;
           border-radius: 999px; background: #1a2740; color: #60a5fa;
           border: 1px solid #2563eb33; }
</style>
</head>
<body>
<h1>Agent Sandbox</h1>
<p class="sub">Composable AI agent infrastructure. Each card is an enabled module.</p>
<div class="grid">
  <a class="card" href="/vnc/">
    <h2>noVNC Desktop</h2>
    <p>Full XFCE4 desktop streamed over WebSocket. Interact with any GUI app.</p>
    <span class="badge">port 6080 → /vnc/</span>
  </a>
  <a class="card" href="/vscode/">
    <h2>VS Code Server</h2>
    <p>Browser-based VS Code. Enable the vscode module to activate.</p>
    <span class="badge">port 8200 → /vscode/</span>
  </a>
  <a class="card" href="/v1/docs">
    <h2>REST API v1</h2>
    <p>FastAPI REST endpoints for shell, files, and browser control. OpenAPI docs included.</p>
    <span class="badge">port 8091 → /v1/</span>
  </a>
  <a class="card" href="/mcp/sse">
    <h2>MCP Server</h2>
    <p>Model Context Protocol server exposing 12 agent tools over HTTP/SSE.</p>
    <span class="badge">port 8079 → /mcp/</span>
  </a>
  <a class="card" href="/api/">
    <h2>Sandbox API</h2>
    <p>Internal REST API for agent tooling and module introspection.</p>
    <span class="badge">port 8091 → /api/</span>
  </a>
</div>
</body>
</html>';
    }

    # -------------------------------------------------------------------------
    # noVNC — WebSocket + static assets
    # -------------------------------------------------------------------------
    location /vnc/ {
        proxy_pass http://127.0.0.1:6080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # -------------------------------------------------------------------------
    # VS Code Server (code-server, enabled by vscode module)
    # -------------------------------------------------------------------------
    location /vscode/ {
        proxy_pass http://127.0.0.1:8200/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # -------------------------------------------------------------------------
    # Internal sandbox API
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8091/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # REST API v1
    # -------------------------------------------------------------------------
    location /v1/ {
        proxy_pass http://127.0.0.1:8091/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # MCP server (SSE — long-lived connections)
    # -------------------------------------------------------------------------
    location /mcp/ {
        proxy_pass http://127.0.0.1:8079/mcp/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }

    # -------------------------------------------------------------------------
    # Health check endpoint
    # -------------------------------------------------------------------------
    location /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }
}
