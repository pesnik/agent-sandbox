[program:chromium]
; Chromium with remote debugging on port 9222, using the shared Xvfb display :1.
; CDP clients can connect to http://localhost:9222 for browser automation.
command=/usr/bin/chromium-browser
    --no-sandbox
    --disable-dev-shm-usage
    --disable-gpu
    --disable-software-rasterizer
    --remote-debugging-port=9222
    --remote-debugging-address=0.0.0.0
    --user-data-dir=/root/.config/chromium-sandbox
    --window-size=1280,800
    --window-position=0,0
    --start-maximized
    --no-first-run
    --no-default-browser-check
    --disable-background-networking
    --disable-default-apps
    --disable-extensions
    --disable-sync
    --disable-translate
    --metrics-recording-only
    --safebrowsing-disable-auto-update
    --password-store=basic
    about:blank
autostart=true
autorestart=true
priority=50
startsecs=5
startretries=3
user=root
environment=DISPLAY=":1",HOME="/root",DBUS_SESSION_BUS_ADDRESS="autolaunch:"
stdout_logfile=/var/log/supervisor/chromium.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/supervisor/chromium-err.log
stderr_logfile_maxbytes=5MB
